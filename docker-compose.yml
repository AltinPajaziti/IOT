# IoT pipeline stack (Professor requirements: Kafka + Spark + Cassandra)
# Start: docker compose up -d
# Kafka UI: http://localhost:8080
# Cassandra CQL: localhost:3004
# Spark Master UI: http://localhost:8081
# Spark Worker UI: http://localhost:8082
# Spark Streaming App UI: http://localhost:4040

services:
  spark-master:
    image: spark:3.5.0
    container_name: ioth-spark-master
    ports:
      - "8081:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy

  spark-worker:
    image: spark:3.5.0
    container_name: ioth-spark-worker
    ports:
      - "8082:8081"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master

  spark-streaming:
    image: spark:3.5.0
    container_name: ioth-spark-streaming
    user: root
    ports:
      - "4040:4040"
    working_dir: /opt/ioth/spark-jobs
    volumes:
      - ./spark-jobs:/opt/ioth/spark-jobs:ro
      - spark_checkpoints:/tmp/spark-checkpoint
      - spark_ivy_cache:/tmp/.ivy2
    environment:
      HOME: /tmp
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: traffic-sensor-events
      CASSANDRA_HOST: cassandra
      CASSANDRA_KEYSPACE: traffic_iot
    command:
      [
        "/bin/bash",
        "-lc",
        "mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars /tmp/spark-checkpoint && exec /opt/spark/bin/spark-submit --master spark://spark-master:7077 --conf spark.jars.ivy=/tmp/.ivy2 --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,com.datastax.spark:spark-cassandra-connector_2.12:3.5.0 /opt/ioth/spark-jobs/traffic_streaming.py"
      ]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    restart: unless-stopped

  cassandra-web:
    image: ipushc/cassandra-web
    container_name: ioth-cassandra-web
    ports:
      - "3004:8083"
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
    depends_on:
      cassandra:
        condition: service_healthy
  kafka:
    image: apache/kafka:3.7.0
    container_name: ioth-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  cassandra:
    image: cassandra:4.1
    container_name: ioth-cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra/schema.cql:/docker-entrypoint-initdb.d/schema.cql:ro
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ioth-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=ioth
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092

volumes:
  kafka_data:
  cassandra_data:
  spark_checkpoints:
  spark_ivy_cache:
